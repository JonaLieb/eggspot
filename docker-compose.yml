services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eggspot_app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: eggspot_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: eggspot
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: eggspot
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
